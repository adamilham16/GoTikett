services:

  # ── Aplikasi Laravel (PHP-FPM + Nginx dalam satu container) ──────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gotiket_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    environment:
      APP_ENV: "${APP_ENV:-local}"
      APP_DEBUG: "${APP_DEBUG:-true}"
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL:-http://localhost:8000}"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-gotiket}"
      DB_USERNAME: "${DB_USERNAME:-gotiket_user}"
      DB_PASSWORD: "${DB_PASSWORD:-gotiket_pass}"
      SESSION_DRIVER: file
      SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-false}"
      SESSION_DOMAIN: "${SESSION_DOMAIN}"
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      MAIL_MAILER: "${MAIL_MAILER:-log}"
      MAIL_HOST: "${MAIL_HOST}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USERNAME: "${MAIL_USERNAME}"
      MAIL_PASSWORD: "${MAIL_PASSWORD}"
      MAIL_ENCRYPTION: "${MAIL_ENCRYPTION:-tls}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-GoTiket}"
    volumes:
      - ./.env:/var/www/html/.env
      - ./bootstrap/app.php:/var/www/html/bootstrap/app.php
      - ./app/Http:/var/www/html/app/Http
      - ./app/Models:/var/www/html/app/Models
      - ./app/Providers:/var/www/html/app/Providers
      - ./resources:/var/www/html/resources
      - ./routes:/var/www/html/routes
      - ./database:/var/www/html/database
      - ./public/logo-simgroup.png:/var/www/html/public/logo-simgroup.png:ro
      - ./public/logo-simgroup-transp.png:/var/www/html/public/logo-simgroup-transp.png:ro
      - ./docker/supervisor/supervisord.conf:/etc/supervisord.conf:ro
      - ./app/Console:/var/www/html/app/Console
      - ./app/Mail:/var/www/html/app/Mail
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
      - db_backups:/var/backups/gotiket
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gotiket_net

  # ── MySQL 8 ───────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: gotiket_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-gotiket}"
      MYSQL_USER: "${DB_USERNAME:-gotiket_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-gotiket_pass}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root_secret}"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "${DB_PORT_EXPOSE:-3306}:3306"
    networks:
      - gotiket_net

  # ── phpMyAdmin (opsional, untuk manajemen DB via browser) ─────────────────
  phpmyadmin:
    image: phpmyadmin:5
    container_name: gotiket_pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: "${DB_ROOT_PASSWORD:-root_secret}"
      UPLOAD_LIMIT: 100M
    ports:
      - "${PMA_PORT:-8080}:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gotiket_net
    profiles:
      - tools   # aktifkan dengan: docker compose --profile tools up

volumes:
  db_data:
    driver: local
  app_storage:
    driver: local
  app_logs:
    driver: local
  db_backups:
    driver: local

networks:
  gotiket_net:
    driver: bridge
